appId: host.exp.Exponent
---
# Test 5 — Create Event (Full Flow)


# 2. Start Creation Flow
- tapOn:
    id: "create-button"

# 3. Step 1: Select Category
- assertVisible: "STEP 1 OF 3"
- tapOn: "Sports"

# 4. Step 2: Select Subcategory
- assertVisible: "STEP 2 OF 3"
- tapOn: "Badminton"
- tapOn: "Continue"

# 5. Step 3: Fill Form
- evalScript: "maestro.sleep(1000)" # Wait for transition

- tapOn:
    id: "event-title-input"
- inputText: "Badminton Match Friday"
- hideKeyboard

# 6. Select Location
- tapOn: "Inside Uni"
- assertVisible: "Select Location"
- scrollUntilVisible:
    element: "Badminton court"
    direction: DOWN
- tapOn: "Badminton court"

# 7. Post Event
- tapOn:
    id: "post-event-button"

# 8. Success & Navigation
- evalScript: "maestro.sleep(3000)"
- assertVisible: "Successfully Posted!"
- tapOn: "View Participants"

